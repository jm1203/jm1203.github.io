title: Jimin's Tech & Security Blog
tagline: Engineering Multi-Cloud Logs & Space Asset Security
description: >
  Technical blog focusing on Multi-Cloud Log Integration (AWS/GCP/NCP to OCSF), Space Asset Security, and System Engineering.

# ⚠️ Jimin님의 실제 깃허브 블로그 주소로 완벽 매칭
url: "https://jm1203.github.io"
baseurl: ""

lang: ko
timezone: Asia/Seoul

author:
  name: Jimin
  email:         # 필요한 경우 본인 이메일을 입력해 주세요.
  github: jm1203

social:
  name: Jimin
  email: 
  github: jm1203
  links:
    - https://github.com/jm1203

# 프로필에 노출될 아바타 이미지 주소 (나중에 assets/img 폴더에 jimin.jpg를 넣으시면 연동됩니다)
avatar: /assets/img/jimin.jpg

# Analytics (옛날 주인장 트래킹 ID는 비워두거나 나중에 본인 구글 애널리틱스 ID로 채우시면 됩니다)
analytics:
  google:
    id: 

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false
permalink: /:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - "*.gem"
  - "*.gemspec"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

sass:
  style: compressed
  sass_dir: _sass

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

paginate: 6
paginate_path: "/page:num/"

jekyll_compose:
  auto_open: true
  default_front_matter:
    posts:
      description: ''
      category: ''
      tags: []
      pin: false
      hide_toc: false