title: P0LESTAR
tagline: 
description: >
  

url: "https://p0lestar.github.io"
baseurl: ""

lang: ko
timezone: Asia/Seoul

author:
  name: P0LESTAR
  email: ayj318410@gmail.com
  github: P0LESTAR

social:
  name: P0LESTAR
  email: ayj318410@gmail.com
  github: P0LESTAR
  links:
    - https://github.com/P0LESTAR

# Avatar shown on About page
avatar: /assets/img/polestar.jpg

# Analytics
analytics:
  google:
    id: G-WVVY819N8F

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false
permalink: /:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - "*.gem"
  - "*.gemspec"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

sass:
  style: compressed
  sass_dir: _sass

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

paginate: 6
paginate_path: "/page:num/"

jekyll_compose:
  auto_open: true
  default_front_matter:
    posts:
      description: ''
      category: ''
      tags: []
      pin: false
      hide_toc: false
